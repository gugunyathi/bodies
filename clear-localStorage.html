<!DOCTYPE html>
<html>
<head>
    <title>Clear SwipeStack LocalStorage</title>
</head>
<body>
    <h1>Clear SwipeStack LocalStorage</h1>
    <button onclick="clearStorage()">Clear LocalStorage</button>
    <div id="result"></div>
    
    <script>
        function clearStorage() {
            try {
                localStorage.removeItem('swipestack_current_index');
                localStorage.removeItem('swipestack_removed_profiles');
                document.getElementById('result').innerHTML = '<p style="color: green;">LocalStorage cleared successfully!</p>';
                
                // Also show what was cleared
                console.log('Cleared localStorage items:');
                console.log('- swipestack_current_index');
                console.log('- swipestack_removed_profiles');
                
                // Redirect to main app after 2 seconds
                setTimeout(() => {
                    window.location.href = 'http://localhost:3000';
                }, 2000);
            } catch (error) {
                document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
        
        // Auto-clear on page load
        window.onload = function() {
            clearStorage();
        };
    </script>
</body>
</html>
